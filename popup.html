<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Alias</title>
    <link rel="stylesheet" href="/src/styles/popup.css" />
  </head>
  <body>
    <main class="popup">
      <button
        id="themeToggle"
        class="theme-toggle"
        type="button"
        aria-label="Activer le mode sombre"
        title="Activer le mode sombre"
      >
        <span class="theme-icon sun" aria-hidden="true">☀</span>
        <span class="theme-icon moon" aria-hidden="true">🌙</span>
      </button>

      <header class="hero">
        <p class="eyebrow">Smart relay</p>
        <h1>Email Alias Studio</h1>
        <p id="siteHint">Current site: -</p>
      </header>

      <section class="panel panel-primary">
        <p class="panel-label">Quick action</p>
        <button id="generateBtn" type="button">Generate + Create + Copy</button>
        <button id="fillBtn" type="button" class="secondary" disabled>Fill email field</button>
        <p id="status" aria-live="polite">Configure your settings in Options first.</p>
      </section>

      <section class="panel alias-panel">
        <div class="row row-tight">
          <h2>Last alias</h2>
          <span class="pill">Clipboard ready</span>
        </div>
        <code id="aliasValue">-</code>
      </section>

      <section class="panel">
        <div class="row">
          <h2>Recent aliases</h2>
          <button id="refreshHistoryBtn" type="button" class="ghost">Refresh</button>
        </div>
        <ul id="historyList" class="history"></ul>
      </section>

      <footer>
        <a href="options.html" target="_blank" rel="noreferrer">Open options</a>
      </footer>
    </main>
    <script type="module" src="/src/popup/popup.ts"></script>
  </body>
</html>
