<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Alias Options</title>
    <link rel="stylesheet" href="/src/styles/options.css" />
  </head>
  <body>
    <main class="options">
      <button
        id="themeToggle"
        class="theme-toggle"
        type="button"
        aria-label="Activer le mode sombre"
        title="Activer le mode sombre"
      >
        <span class="theme-icon sun" aria-hidden="true">☀</span>
        <span class="theme-icon moon" aria-hidden="true">🌙</span>
      </button>

      <header class="hero">
        <p class="eyebrow">Control center</p>
        <h1>Email Alias Configuration</h1>
        <p>Set your domain, forwarding address, and Cloudflare credentials in one place.</p>
      </header>

      <form id="settingsForm" novalidate>
        <section class="panel">
          <div class="panel-header">
            <h2>Alias routing</h2>
            <span class="badge">Required</span>
          </div>
          <div class="field-grid">
            <label>
              Domain
              <input id="domain" name="domain" type="text" placeholder="example.com" required />
            </label>

            <label>
              Forward destination email
              <input
                id="destinationEmail"
                name="destinationEmail"
                type="email"
                placeholder="you@gmail.com"
                required
              />
            </label>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Cloudflare access</h2>
            <span class="badge">Secure</span>
          </div>
          <div class="field-grid field-grid-stack">
            <label>
              Cloudflare Account ID
              <input id="accountId" name="accountId" type="text" required />
            </label>

            <label>
              Cloudflare Zone ID
              <input id="zoneId" name="zoneId" type="text" required />
            </label>

            <label>
              Cloudflare API Token
              <input id="apiToken" name="apiToken" type="password" required />
            </label>
          </div>
        </section>

        <div class="actions">
          <button id="saveBtn" type="submit">Save</button>
          <button id="testBtn" type="button" class="secondary">Test Cloudflare access</button>
          <button id="clearHistoryBtn" type="button" class="ghost">Clear history</button>
        </div>
      </form>

      <p id="status" aria-live="polite"></p>
    </main>
    <script type="module" src="/src/options/options.ts"></script>
  </body>
</html>
